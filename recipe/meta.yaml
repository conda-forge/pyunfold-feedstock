{% set name = "PyUnfold" %}
{% set version = "0.5.0" %}
{% set sha256 = "d3e7d7da9fa03d218b117780e8f6894f2fba1452f6f8e1cab1e556e46242d980" %}

package:
  name: {{ name|lower }}
  version: {{ version }}

source:
  fn: {{ name }}-{{ version }}.tar.gz
  url: https://pypi.org/packages/source/{{ name[0] }}/{{ name }}/{{ name }}-{{ version }}.tar.gz
  sha256: {{ sha256 }}

build:
  number: 1
  noarch: python
  script: {{ PYTHON }} -m pip install . --no-deps -vv

requirements:
  host:
    - python {{ python_min }}
    - pip
  run:
    - python >={{ python_min }},<3.7
    - numpy
    - scipy
    - pandas
    - six


test:
  requires:
    - pytest
    - python {{ python_min }}
  imports:
    - pyunfold
    - pyunfold.callbacks
    - pyunfold.mix
    - pyunfold.priors
    - pyunfold.teststat
    - pyunfold.unfold
    - pyunfold.utils
    - pyunfold.tests.test_utils

about:
  home: https://github.com/jrbourbeau/pyunfold
  license: MIT
  license_family: MIT
  license_file: LICENSE
  summary: 'PyUnfold: A Python package for iterative unfolding'

  description: |
    PyUnfold is a Python package for implementing iterative unfolding.
  doc_url: https://jrbourbeau.github.io/pyunfold/
  dev_url: https://github.com/jrbourbeau/pyunfold

extra:
  recipe-maintainers:
    - jrbourbeau
